<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Asistente de Voz v0.1.1</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7F77DD">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f0f0eb; --surface: #ffffff; --border: #e0e0d8; --text: #111111;
  --muted: #888888; --accent: #7F77DD; --accent-l: #EEEDFE;
  --green: #1D9E75; --red: #E24B4A;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Estilos de Ventanas */
.window { position: fixed; inset: 0; background: var(--surface); z-index: 100; display: none; flex-direction: column; }
.header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.content { padding: 20px; overflow-y: auto; flex: 1; }

/* Configuración */
.config-group { margin-bottom: 20px; }
.config-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; }
input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
input[type="range"] { accent-color: var(--accent); height: 8px; }

.btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
.version-tag { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 20px; }

/* Pantalla de Voz (Simplificada para el ejemplo) */
#voiceUI { display: flex; background: #12121f; color: white; }
.status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--muted); margin-right: 8px; }
.status-active { background: var(--green); box-shadow: 0 0 10px var(--green); }
</style>
</head>
<body>

<div style="padding: 20px;">
  <button onclick="toggleWin('configWin')" style="padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);">⚙️ Configuración</button>
</div>

<div id="configWin" class="window" style="display: flex;">
  <div class="header">
    <h2>Configuración</h2>
    <button onclick="toggleWin('configWin')" style="background:none; border:none; font-size:1.5rem;">✕</button>
  </div>
  <div class="content">
    <div class="config-group">
      <label>API Key de Groq:</label>
      <input type="password" id="apiKeyInput" placeholder="gsk_...">
    </div>
    
    <div class="config-group">
      <label>Voz del Asistente:</label>
      <select id="voiceSel"></select>
    </div>

    <div class="config-group">
      <label id="silenceLabel">Tiempo de espera para hablar: 1.5s</label>
      <input type="range" id="silenceSlider" min="500" max="5000" step="100" value="1500" oninput="updateSilenceLabel(this.value)">
    </div>

    <button class="btn-save" onclick="saveConfig()">Guardar Cambios</button>
    <p class="version-tag">Versión v0.1.1</p>
  </div>
</div>

<script>
let SILENCE_TIMEOUT = 1500;
let history = [];

function toggleWin(id) {
  const win = document.getElementById(id);
  win.style.display = win.style.display === 'none' ? 'flex' : 'none';
}

function updateSilenceLabel(val) {
  document.getElementById('silenceLabel').innerText = `Tiempo de espera para hablar: ${(val/1000).toFixed(1)}s`;
}

// --- MEJORA: Resiliencia de Voces ---
function populateVoices() {
  const sel = document.getElementById('voiceSel');
  if (!sel) return;
  const voices = window.speechSynthesis.getVoices();
  const current = localStorage.getItem('selected_voice');
  
  sel.innerHTML = voices
    .filter(v => v.lang.includes('es'))
    .map(v => `<option value="${v.name}" ${v.name === current ? 'selected' : ''}>${v.name}</option>`)
    .join('');
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = populateVoices;
  // Intento inmediato para navegadores rápidos
  setTimeout(populateVoices, 100);
}

// --- MEJORA: TTS Filtrado para Niños ---
function tts(text) {
  if (!window.speechSynthesis) return;
  
  // Limpieza de Markdown y símbolos técnicos
  const cleanText = text
    .replace(/\*\*/g, '') 
    .replace(/[*_`#>]/g, '')
    .replace(/- /g, ' ') 
    .replace(/\n/g, '. ') 
    .trim();

  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(cleanText);
  const voices = window.speechSynthesis.getVoices();
  const voiceName = localStorage.getItem('selected_voice');
  const v = voices.find(v => v.name === voiceName);
  if (v) utt.voice = v;
  
  utt.rate = 0.95; // Un poco más lento para niños
  window.speechSynthesis.speak(utt);
}

// --- MEJORA: Manejo de Errores y Tokens ---
async function callGroq(userMsg) {
  const apiKey = localStorage.getItem('groq_api_key');
  if (!apiKey) { alert("Configura tu API Key primero."); return; }

  if (!navigator.onLine) {
    tts("Lo siento, parece que no tengo internet ahora mismo. ¿Podés revisar tu conexión?");
    return;
  }

  try {
    const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          { role: "system", content: "Sos Asistente, un asistente amigable y paciente para niños de Paraguay. Hablás en español paraguayo de forma simple y divertida. Explicás con ejemplos cotidianos, sos entusiasta y alentador. Nunca usás lenguaje adulto ni contenido inapropiado. Respondés siempre brevemente, máximo 3 oraciones." },
          ...history,
          { role: "user", content: userMsg }
        ]
      })
    });

    if (resp.status === 429) {
      tts("¡Qué pena! Se me acabaron las pilas por hoy. Vamos a descansar y hablamos más tarde, ¿sí?");
      return;
    }

    if (!resp.ok) throw new Error();

    const data = await resp.json();
    const aiMsg = data.choices[0].message.content;
    history.push({ role: "assistant", content: aiMsg });
    tts(aiMsg);
  } catch (err) {
    tts("Huy, me dio un pequeño dolor de cabeza. ¿Podés intentar decirme eso de nuevo?");
  }
}

function saveConfig() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const voice = document.getElementById('voiceSel').value;
  const sil = document.getElementById('silenceSlider').value;

  if (key) localStorage.setItem('groq_api_key', key);
  localStorage.setItem('selected_voice', voice);
  localStorage.setItem('silence_timeout', sil);
  SILENCE_TIMEOUT = parseInt(sil);
  
  alert("Configuración guardada correctamente");
  toggleWin('configWin');
}

// Carga inicial
window.onload = () => {
  const savedSil = localStorage.getItem('silence_timeout');
  if (savedSil) {
    SILENCE_TIMEOUT = parseInt(savedSil);
    document.getElementById('silenceSlider').value = savedSil;
    updateSilenceLabel(savedSil);
  }
};
</script>
</body>
</html>
